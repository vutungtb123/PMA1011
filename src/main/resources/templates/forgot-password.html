<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quên mật khẩu - Nhập email để nhận mã OTP">
    <title>Quên Mật Khẩu | Thư Viện Trường</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">📚</div>
            <div class="auth-logo-text">
                <span class="auth-logo-name">Thư Viện Trường</span>
                <span class="auth-logo-sub">School Library System</span>
            </div>
        </div>

        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step-item active">
                <div class="step-circle">1</div>
                <span class="step-label">Email</span>
            </div>
            <div class="step-item">
                <div class="step-circle">2</div>
                <span class="step-label">Mã OTP</span>
            </div>
            <div class="step-item">
                <div class="step-circle">3</div>
                <span class="step-label">Mật khẩu mới</span>
            </div>
        </div>

        <h1 class="auth-title">Quên mật khẩu?</h1>
        <p class="auth-subtitle">Nhập email trường của bạn, chúng tôi sẽ gửi mã OTP xác nhận.</p>

        <!-- Thông báo lỗi -->
        <div th:if="${errorMessage}" class="alert alert-error">
            <i class="fa-solid fa-circle-exclamation alert-icon"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <form id="forgot-form" method="post" th:action="@{/forgot-password}" th:object="${forgotPasswordDto}" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="forgot-email">Địa chỉ Email</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input
                        class="form-control"
                        type="email"
                        id="forgot-email"
                        th:field="*{email}"
                        placeholder="example@truong.edu.vn"
                        autocomplete="email"
                        required
                    >
                </div>
            </div>

            <!-- Nút gửi OTP -->
            <button type="submit" class="btn-primary" id="send-otp-btn">
                <span>Gửi mã OTP</span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Nhớ mật khẩu rồi? <a th:href="@{/login}" class="btn-link">Đăng nhập</a></p>
        </div>

    </div>
</div>

<script>
    const form = document.getElementById('forgot-form');
    const btn = document.getElementById('send-otp-btn');

    form.addEventListener('submit', () => {
        btn.disabled = true;
        btn.querySelector('span').textContent = 'Đang gửi...';
    });
</script>
</body>
</html>
