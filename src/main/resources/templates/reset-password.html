<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đặt lại mật khẩu mới">
    <title>Đặt Lại Mật Khẩu | Thư Viện Trường</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">📚</div>
            <div class="auth-logo-text">
                <span class="auth-logo-name">Thư Viện Trường</span>
                <span class="auth-logo-sub">School Library System</span>
            </div>
        </div>

        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step-item completed">
                <div class="step-circle"><i class="fa-solid fa-check" style="font-size:13px;"></i></div>
                <span class="step-label">Email</span>
            </div>
            <div class="step-item completed">
                <div class="step-circle"><i class="fa-solid fa-check" style="font-size:13px;"></i></div>
                <span class="step-label">Mã OTP</span>
            </div>
            <div class="step-item active">
                <div class="step-circle">3</div>
                <span class="step-label">Mật khẩu mới</span>
            </div>
        </div>

        <h1 class="auth-title">Đặt mật khẩu mới</h1>
        <p class="auth-subtitle">
            Tài khoản: <strong style="color: var(--primary-light);" th:text="${email}">email@truong.edu.vn</strong>
        </p>

        <!-- Alert lỗi -->
        <div th:if="${errorMessage}" class="alert alert-error">
            <i class="fa-solid fa-circle-exclamation alert-icon"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <form id="reset-form" method="post" th:action="@{/reset-password}" th:object="${resetPasswordDto}" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{email}" th:value="${email}"/>

            <!-- Mật khẩu mới -->
            <div class="form-group">
                <label class="form-label" for="new-password">Mật khẩu mới</label>
                <div class="input-wrapper has-toggle">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input
                        class="form-control"
                        type="password"
                        id="new-password"
                        th:field="*{newPassword}"
                        placeholder="Tối thiểu 6 ký tự"
                        autocomplete="new-password"
                        required
                    >
                    <button type="button" class="password-toggle" id="toggle-new" aria-label="Hiện/ẩn mật khẩu">
                        <i class="fa-solid fa-eye" id="toggle-new-icon"></i>
                    </button>
                </div>
                <!-- Thanh độ mạnh mật khẩu -->
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <div class="strength-label" id="strength-label">Độ mạnh mật khẩu</div>
            </div>

            <!-- Xác nhận mật khẩu -->
            <div class="form-group">
                <label class="form-label" for="confirm-password">Xác nhận mật khẩu</label>
                <div class="input-wrapper has-toggle">
                    <i class="fa-solid fa-lock-open input-icon"></i>
                    <input
                        class="form-control"
                        type="password"
                        id="confirm-password"
                        th:field="*{confirmPassword}"
                        placeholder="Nhập lại mật khẩu"
                        autocomplete="new-password"
                        required
                    >
                    <button type="button" class="password-toggle" id="toggle-confirm" aria-label="Hiện/ẩn mật khẩu">
                        <i class="fa-solid fa-eye" id="toggle-confirm-icon"></i>
                    </button>
                </div>
                <div id="match-msg" style="font-size:12px; margin-top:6px; min-height:16px;"></div>
            </div>

            <button type="submit" class="btn-primary" id="reset-btn">
                <span>Xác nhận đặt lại mật khẩu</span>
            </button>
        </form>

    </div>
</div>

<script>
    // ── Toggle hiện/ẩn mật khẩu ───────────────────────────────────
    function setupToggle(toggleId, iconId, inputId) {
        document.getElementById(toggleId).addEventListener('click', () => {
            const inp = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            const isHidden = inp.type === 'password';
            inp.type = isHidden ? 'text' : 'password';
            icon.className = isHidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        });
    }
    setupToggle('toggle-new', 'toggle-new-icon', 'new-password');
    setupToggle('toggle-confirm', 'toggle-confirm-icon', 'confirm-password');

    // ── Password strength ────────────────────────────────────────
    const newPassInput = document.getElementById('new-password');
    const strengthFill = document.getElementById('strength-fill');
    const strengthLabel = document.getElementById('strength-label');

    newPassInput.addEventListener('input', () => {
        const val = newPassInput.value;
        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/\d/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
            { pct: '0%',   color: 'transparent', label: 'Độ mạnh mật khẩu' },
            { pct: '25%',  color: '#EF4444',      label: 'Rất yếu' },
            { pct: '50%',  color: '#F59E0B',      label: 'Yếu' },
            { pct: '75%',  color: '#3B82F6',      label: 'Trung bình' },
            { pct: '90%',  color: '#10B981',      label: 'Mạnh' },
            { pct: '100%', color: '#059669',      label: 'Rất mạnh' },
        ];

        const lvl = levels[Math.min(score, levels.length - 1)];
        strengthFill.style.width = lvl.pct;
        strengthFill.style.background = lvl.color;
        strengthLabel.textContent = lvl.label;
        strengthLabel.style.color = lvl.color;
        checkMatch();
    });

    // ── Kiểm tra khớp mật khẩu ───────────────────────────────────
    const confirmInput = document.getElementById('confirm-password');
    const matchMsg = document.getElementById('match-msg');

    function checkMatch() {
        const newVal = newPassInput.value;
        const confVal = confirmInput.value;
        if (!confVal) { matchMsg.textContent = ''; return; }

        if (newVal === confVal) {
            matchMsg.textContent = '✓ Mật khẩu khớp';
            matchMsg.style.color = '#10B981';
        } else {
            matchMsg.textContent = '✗ Mật khẩu không khớp';
            matchMsg.style.color = '#EF4444';
        }
    }

    confirmInput.addEventListener('input', checkMatch);

    // ── Validate trước submit ─────────────────────────────────────
    document.getElementById('reset-form').addEventListener('submit', (e) => {
        const newVal = newPassInput.value;
        const confVal = confirmInput.value;

        if (newVal.length < 6) {
            e.preventDefault();
            alert('Mật khẩu phải có ít nhất 6 ký tự.');
            return;
        }
        if (newVal !== confVal) {
            e.preventDefault();
            alert('Mật khẩu xác nhận không khớp. Vui lòng kiểm tra lại.');
        }
    });
</script>
</body>
</html>
