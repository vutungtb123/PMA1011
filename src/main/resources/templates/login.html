<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng nhập vào Hệ thống Quản lý Thư viện Trường học">
    <title>Đăng Nhập | Thư Viện Trường</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">📚</div>
            <div class="auth-logo-text">
                <span class="auth-logo-name">Thư Viện Trường</span>
                <span class="auth-logo-sub">School Library System</span>
            </div>
        </div>

        <h1 class="auth-title">Chào mừng trở lại!</h1>
        <p class="auth-subtitle">Đăng nhập bằng tài khoản do nhà trường cung cấp.</p>

        <!-- Alert: Lỗi đăng nhập -->
        <div th:if="${param.error}" class="alert alert-error">
            <i class="fa-solid fa-circle-exclamation alert-icon"></i>
            <span>Email hoặc mật khẩu không đúng. Vui lòng thử lại.</span>
        </div>

        <!-- Alert: Đăng xuất thành công -->
        <div th:if="${param.logout}" class="alert alert-success">
            <i class="fa-solid fa-circle-check alert-icon"></i>
            <span>Bạn đã đăng xuất thành công.</span>
        </div>

        <!-- Alert: Đặt lại mật khẩu thành công -->
        <div th:if="${successMessage}" class="alert alert-success">
            <i class="fa-solid fa-circle-check alert-icon"></i>
            <span th:text="${successMessage}"></span>
        </div>

        <!-- Quick Fill: Tài khoản thử nhanh -->
        <div class="quick-fill-section" th:if="${demoAccounts != null and !demoAccounts.isEmpty()}">
            <div class="quick-fill-label">
                <i class="fa-solid fa-bolt"></i>
                <span>Đăng nhập nhanh</span>
            </div>
            <div class="quick-fill-list">
                <button
                    th:each="acc : ${demoAccounts}"
                    type="button"
                    class="quick-fill-btn"
                    th:classappend="${acc.role == 'ROLE_ADMIN'} ? ' is-admin' : ' is-reader'"
                    th:attr="data-email=${acc.email}, data-password='123456'"
                    th:title="${'Click để điền: ' + acc.email}"
                >
                    <div class="quick-fill-avatar" th:classappend="${acc.role == 'ROLE_ADMIN'} ? ' admin-avatar' : ' reader-avatar'">
                        <i th:class="${acc.role == 'ROLE_ADMIN'} ? 'fa-solid fa-user-shield' : 'fa-solid fa-user-graduate'"></i>
                    </div>
                    <div class="quick-fill-info">
                        <span class="quick-fill-name" th:text="${acc.fullName}">Tên người dùng</span>
                        <span class="quick-fill-role" th:text="${acc.role == 'ROLE_ADMIN'} ? 'Quản trị viên' : 'Độc giả'">Vai trò</span>
                    </div>
                    <i class="fa-solid fa-arrow-right quick-fill-arrow"></i>
                </button>
            </div>
            <p class="quick-fill-hint">
                <i class="fa-solid fa-circle-info"></i>
                Mật khẩu mặc định: <code>123456</code> — bạn có thể thay đổi sau khi đăng nhập.
            </p>
        </div>

        <!-- Form đăng nhập - Spring Security xử lý POST /login -->
        <form id="login-form" method="post" th:action="@{/login}" novalidate>
            <div th:if="${_csrf}" th:field="*{_csrf}" style="display:none"></div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="email">Địa chỉ Email</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input
                        class="form-control"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="example@truong.edu.vn"
                        autocomplete="email"
                        required
                    >
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">Mật khẩu</label>
                <div class="input-wrapper has-toggle">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input
                        class="form-control"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Nhập mật khẩu của bạn"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="password-toggle" id="toggle-password" aria-label="Hiện/ẩn mật khẩu">
                        <i class="fa-solid fa-eye" id="toggle-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Quên mật khẩu -->
            <div class="forgot-link">
                <a th:href="@{/forgot-password}" class="btn-link">Quên mật khẩu?</a>
            </div>

            <!-- Nút đăng nhập -->
            <button type="submit" class="btn-primary" id="login-btn">
                <span>Đăng nhập</span>
            </button>
        </form>

    </div>
</div>

<script>
    // Toggle show/hide password
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggle-icon');

    toggleBtn.addEventListener('click', () => {
        const isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        toggleIcon.className = isHidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });

    // Quick-fill: click to autofill email & password
    document.querySelectorAll('.quick-fill-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const email = btn.getAttribute('data-email');
            const password = btn.getAttribute('data-password');

            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');

            // Flash animation before filling
            emailInput.classList.add('fill-flash');
            passInput.classList.add('fill-flash');

            setTimeout(() => {
                emailInput.value = email;
                passInput.value = password;
                emailInput.classList.remove('fill-flash');
                passInput.classList.remove('fill-flash');
            }, 150);

            // Highlight active card
            document.querySelectorAll('.quick-fill-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
</script>
</body>
</html>
