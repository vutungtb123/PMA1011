<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Đọc thử — ' + ${book.title}">Đọc Thử</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --primary-light: #818cf8; --primary-dark: #4f46e5;
            --accent: #f59e0b; --green: #22c55e;
            --bg-dark: #0f172a; --bg-card: #1e293b; --bg-surface: #334155;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border: #475569;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; overflow: hidden; }

        /* ═══ NAVBAR ═══ */
        .navbar-reader {
            background: rgba(15,23,42,0.92); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 0.7rem 0;
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }
        .navbar-reader .navbar-brand {
            font-weight: 800; font-size: 1.2rem;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .navbar-reader .navbar-brand i { -webkit-text-fill-color: var(--accent); margin-right: 6px; }
        .btn-close-reader {
            background: rgba(239,68,68,0.12); color: #f87171;
            border: 1px solid rgba(239,68,68,0.3); border-radius: 10px;
            padding: 5px 14px; font-size: 0.82rem; font-weight: 500; transition: all 0.3s; text-decoration: none;
        }
        .btn-close-reader:hover { background: rgba(239,68,68,0.25); color: #fca5a5; }
        .book-title-bar {
            font-size: 0.85rem; color: var(--text-secondary); max-width: 300px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .book-title-bar strong { color: var(--text-primary); }
        .page-indicator {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 4px 14px; font-size: 0.82rem;
            font-weight: 600; color: var(--accent);
        }

        /* ═══ READER VIEWPORT ═══ */
        .reader-viewport {
            position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-dark);
        }

        /* ═══ PAGE CONTENT ═══ */
        .page-content {
            max-width: 750px; width: 90%; max-height: calc(100vh - 100px);
            overflow-y: auto; border-radius: 16px;
            background: var(--bg-card); border: 1px solid var(--border);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            transition: opacity 0.3s, transform 0.3s;
        }
        .page-content.fade-out { opacity: 0; transform: scale(0.97); }
        .page-content img {
            width: 100%; display: block; border-radius: 16px;
        }
        .page-content .text-page {
            padding: 40px 36px; font-size: 1.05rem; line-height: 1.9;
            color: var(--text-secondary); white-space: pre-wrap;
        }

        /* ═══ ARROWS ═══ */
        .nav-arrow {
            position: fixed; top: 50%; transform: translateY(-50%);
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(30,41,59,0.85); backdrop-filter: blur(8px);
            border: 2px solid var(--border); color: var(--text-primary);
            font-size: 1.3rem; cursor: pointer; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .nav-arrow:hover {
            background: var(--primary); border-color: var(--primary);
            box-shadow: 0 0 25px rgba(99,102,241,0.5); transform: translateY(-50%) scale(1.1);
        }
        .nav-arrow.disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
        .nav-arrow-left { left: 24px; }
        .nav-arrow-right { right: 24px; }

        /* ═══ END OVERLAY ═══ */
        .end-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,23,42,0.92); backdrop-filter: blur(12px);
            z-index: 200; align-items: center; justify-content: center;
        }
        .end-overlay.show { display: flex; }
        .end-card {
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 24px; padding: 48px 40px; text-align: center;
            max-width: 480px; width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: popIn 0.4s ease forwards;
        }
        @keyframes popIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }

        .end-card .end-icon {
            width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 20px;
            background: rgba(245,158,11,0.12); border: 2px solid rgba(245,158,11,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: var(--accent);
        }
        .end-card h3 { font-weight: 800; font-size: 1.5rem; margin-bottom: 10px; }
        .end-card p { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px; }
        .end-card .btn-borrow-end {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 32px; border-radius: 14px; font-weight: 700; font-size: 1rem;
            background: linear-gradient(135deg, var(--green), #16a34a);
            color: #fff; border: none; cursor: pointer; transition: all 0.3s; text-decoration: none;
        }
        .end-card .btn-borrow-end:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(34,197,94,0.4); color: #fff; }
        .end-card .btn-back-detail {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 14px; color: var(--text-secondary); font-size: 0.85rem;
            text-decoration: none; transition: color 0.3s;
        }
        .end-card .btn-back-detail:hover { color: var(--primary-light); }

        /* ═══ KEYBOARD HINT ═══ */
        .keyboard-hint {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,41,59,0.8); backdrop-filter: blur(8px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 8px 20px; font-size: 0.78rem; color: var(--text-secondary); z-index: 50;
        }
        .keyboard-hint kbd {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 5px; padding: 2px 7px; font-size: 0.75rem;
            font-family: 'Inter', sans-serif; color: var(--text-primary);
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-reader">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-book-open"></i>SchoolLib</a>
        <div class="book-title-bar d-none d-md-block">
            <i class="fas fa-book me-1"></i> <strong th:text="${book.title}">Tên sách</strong>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span class="page-indicator" id="pageIndicator">1 / ?</span>
            <a th:href="@{'/book/' + ${book.bookId}}" class="btn-close-reader">
                <i class="fas fa-times me-1"></i> Đóng
            </a>
        </div>
    </div>
</nav>

<!-- READER VIEWPORT -->
<div class="reader-viewport">
    <!-- Left Arrow -->
    <button class="nav-arrow nav-arrow-left disabled" id="btnPrev" title="Trang trước">
        <i class="fas fa-chevron-left"></i>
    </button>

    <!-- Page Content -->
    <div class="page-content" id="pageContent">
        <div class="text-page" style="text-align:center; padding:80px 40px;">
            <i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary-light)"></i>
            <p style="margin-top:16px;">Đang tải...</p>
        </div>
    </div>

    <!-- Right Arrow -->
    <button class="nav-arrow nav-arrow-right" id="btnNext" title="Trang sau">
        <i class="fas fa-chevron-right"></i>
    </button>
</div>

<!-- END OVERLAY (when trying to go past page 10) -->
<div class="end-overlay" id="endOverlay">
    <div class="end-card">
        <div class="end-icon"><i class="fas fa-lock"></i></div>
        <h3>Đã hết nội dung đọc thử!</h3>
        <p>Bạn đã đọc hết <strong>10 trang</strong> nội dung thử miễn phí.<br>
           Hãy mượn cuốn sách này để tiếp tục khám phá nhé!</p>
        <button class="btn-borrow-end" onclick="alert('Chức năng mượn sách đang được phát triển!')">
            <i class="fas fa-hand-holding-heart"></i> Mượn Sách Ngay
        </button>
        <br>
        <a th:href="@{'/book/' + ${book.bookId}}" class="btn-back-detail">
            <i class="fas fa-arrow-left"></i> Quay lại trang chi tiết
        </a>
    </div>
</div>

<!-- Keyboard Hint -->
<div class="keyboard-hint">
    Dùng <kbd>←</kbd> <kbd>→</kbd> hoặc click mũi tên để chuyển trang
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Page data from server -->
<script th:inline="javascript">
    const samplePages = /*[[${samplePages}]]*/ [];
    const bookId = /*[[${book.bookId}]]*/ 0;
    const MAX_FREE_PAGES = 10;
</script>

<script>
(function() {
    const pageContent = document.getElementById('pageContent');
    const pageIndicator = document.getElementById('pageIndicator');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const endOverlay = document.getElementById('endOverlay');

    let currentIndex = 0;
    const totalPages = samplePages.length;

    function renderPage(index) {
        if (index < 0 || index >= totalPages) return;

        // Check if trying to go beyond page 10
        if (index >= MAX_FREE_PAGES) {
            endOverlay.classList.add('show');
            return;
        }

        // Fade out
        pageContent.classList.add('fade-out');

        setTimeout(() => {
            const page = samplePages[index];
            if (page.isImage || page.image) {
                pageContent.innerHTML = '<img src="' + page.content + '" alt="Trang ' + page.pageNumber + '">';
            } else {
                pageContent.innerHTML = '<div class="text-page">' + escapeHtml(page.content) + '</div>';
            }

            // Update indicator
            pageIndicator.textContent = (index + 1) + ' / ' + Math.min(totalPages, MAX_FREE_PAGES);

            // Update arrows
            btnPrev.classList.toggle('disabled', index === 0);
            btnNext.classList.toggle('disabled', index >= totalPages - 1 && index < MAX_FREE_PAGES);

            currentIndex = index;

            // Fade in
            pageContent.classList.remove('fade-out');
        }, 200);
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML.replace(/\n/g, '<br>');
    }

    // Navigation
    btnPrev.addEventListener('click', () => {
        if (currentIndex > 0) renderPage(currentIndex - 1);
    });

    btnNext.addEventListener('click', () => {
        if (currentIndex < totalPages - 1) {
            renderPage(currentIndex + 1);
        } else if (currentIndex >= MAX_FREE_PAGES - 1) {
            endOverlay.classList.add('show');
        }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (endOverlay.classList.contains('show')) {
            if (e.key === 'Escape') endOverlay.classList.remove('show');
            return;
        }
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            if (currentIndex > 0) renderPage(currentIndex - 1);
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            if (currentIndex < totalPages - 1) {
                renderPage(currentIndex + 1);
            } else if (currentIndex >= MAX_FREE_PAGES - 1) {
                endOverlay.classList.add('show');
            }
        } else if (e.key === 'Escape') {
            window.location.href = '/book/' + bookId;
        }
    });

    // Close overlay when clicking outside card
    endOverlay.addEventListener('click', (e) => {
        if (e.target === endOverlay) endOverlay.classList.remove('show');
    });

    // Initial render
    if (totalPages > 0) {
        renderPage(0);
    } else {
        pageContent.innerHTML = '<div class="text-page" style="text-align:center;padding:80px 40px;">' +
            '<i class="fas fa-book" style="font-size:3rem;color:var(--bg-surface);margin-bottom:16px;display:block;"></i>' +
            '<h4 style="color:var(--text-secondary);">Chưa có nội dung đọc thử</h4>' +
            '<p style="color:var(--text-secondary);opacity:0.7;">Cuốn sách này chưa được cập nhật nội dung thử.</p></div>';
        btnNext.classList.add('disabled');
        pageIndicator.textContent = '0 / 0';
    }
})();
</script>
</body>
</html>
