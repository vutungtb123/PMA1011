spring.application.name=school-library-system

# ==================== DATABASE ====================
# SQL Server chạy trên port 1433 (instance: SQL2022)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SchoolLibraryDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==================== JPA ====================
# ⚠️ Lần đầu chạy: để 'create' → sau khi app start thành công đổi sang 'none'
# ddl-auto: create = xóa & tạo lại | update = cập nhật | none = không đụng schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
# Giữ nguyên tên bảng như trong @Table/@JoinTable, không convert sang snake_case
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ==================== THYMELEAF ====================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ==================== MAIL (Gmail SMTP) ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=vutungtb2007@gmail.com
spring.mail.password=gdls lwbi nzia ywab
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==================== OTP CONFIG ====================
app.otp.expiry-minutes=5
app.mail.from=vutungtb2007@gmail.com

# ==================== LOGGING ====================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.context=DEBUG
logging.level.org.hibernate=ERROR

# ==================== FILE UPLOAD ====================
# Tang gioi han upload file (anh bia sach, trang mau...)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ==================== LOGGING ====================
# Tắt log lỗi favicon (browser tự gọi, không có file favicon.ico)
logging.level.org.springframework.web.servlet.resource=OFF
